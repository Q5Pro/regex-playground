<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Playground</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #11151c;
    --border: #1f2630;
    --text: #c8d1e0;
    --text-dim: #5b6679;
    --accent: #ff9d5c;
    --accent-soft: #ff9d5c33;
    --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
    --match-colors: #ff9d5c, #5ce1ff, #9dff5c, #ff5c9d, #c95cff, #ffe65c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 28px;
  }

  header .eyebrow {
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  header h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 600;
    color: #f0f3f9;
  }

  header p {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
    max-width: 560px;
    line-height: 1.5;
  }

  .pattern-row {
    display: flex;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    margin-bottom: 8px;
  }

  .slash {
    color: var(--text-dim);
    font-size: 18px;
    padding: 0 4px;
  }

  #pattern {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #f0f3f9;
    font-family: var(--mono);
    font-size: 16px;
    padding: 14px 4px;
  }

  .flags {
    display: flex;
    gap: 6px;
  }

  .flag-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 5px;
    width: 28px;
    height: 28px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .flag-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .error-line {
    color: #ff5c7a;
    font-size: 12px;
    min-height: 18px;
    margin-bottom: 16px;
    padding-left: 4px;
  }

  .anatomy {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
    min-height: 28px;
  }

  .anatomy-token {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .anatomy-token code {
    color: var(--accent);
    font-weight: 600;
  }

  .anatomy-token span {
    color: var(--text-dim);
  }

  .panel-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  textarea#test-string {
    width: 100%;
    min-height: 160px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: transparent;
    caret-color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    position: relative;
    z-index: 2;
  }

  .highlight-layer {
    width: 100%;
    min-height: 160px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    color: var(--text);
    pointer-events: none;
  }

  .editor-stack {
    position: relative;
    margin-bottom: 24px;
  }

  mark {
    border-radius: 3px;
    padding: 1px 0;
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .match-count {
    font-size: 13px;
    color: var(--text-dim);
  }

  .match-count strong {
    color: var(--accent);
  }

  .matches {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .match-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: baseline;
  }

  .match-item .idx {
    color: var(--text-dim);
    font-size: 11px;
  }

  .match-item .full {
    color: #f0f3f9;
    font-weight: 600;
  }

  .match-item .group {
    color: var(--text-dim);
    font-size: 12px;
  }

  .group-name {
    color: #5ce1ff;
  }

  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .cheatsheet {
    margin-top: 36px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .cheat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
  }

  .cheat-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .cheat-item:hover {
    border-color: var(--accent);
  }

  .cheat-item code {
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
    font-size: 13px;
  }

  .cheat-item .desc {
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Regex Playground</div>
    <h1>Deseni yaz, eşleşmeleri canlı gör</h1>
    <p>Bir regex deseni yazın, altına test metni girin. Eşleşmeler metinde anlık olarak renklendirilir, gruplar ve konumlar aşağıda listelenir.</p>
  </header>

  <div class="pattern-row">
    <span class="slash">/</span>
    <input id="pattern" type="text" value="(\w+)@(\w+)\.com" spellcheck="false" autocomplete="off">
    <span class="slash">/</span>
    <div class="flags" id="flags"></div>
  </div>
  <div class="error-line" id="error-line"></div>
  <div class="anatomy" id="anatomy"></div>

  <div class="panel-label">Test Metni</div>
  <div class="editor-stack">
    <div class="highlight-layer" id="highlight-layer"></div>
    <textarea id="test-string" spellcheck="false">İletişim için: ayse@firma.com veya destek@yardim.com adresine yazabilirsiniz.
İkinci bir adres: mehmet@ornek.com de kullanılabilir.</textarea>
  </div>

  <div class="results-header">
    <div class="panel-label" style="margin:0">Eşleşmeler</div>
    <div class="match-count" id="match-count"></div>
  </div>
  <div class="matches" id="matches"></div>

  <div class="cheatsheet">
    <div class="panel-label">Sık Kullanılan Desenler (tıkla, dene)</div>
    <div class="cheat-grid" id="cheat-grid"></div>
  </div>
</div>

<script>
const FLAGS = [
  { key: 'g', label: 'g', title: 'global — tüm eşleşmeleri bul' },
  { key: 'i', label: 'i', title: 'ignoreCase — büyük/küçük harf duyarsız' },
  { key: 'm', label: 'm', title: 'multiline — ^ ve $ her satırda çalışır' },
  { key: 's', label: 's', title: 'dotAll — . karakteri yeni satırı da kapsar' },
];

const TOKEN_EXPLANATIONS = [
  { re: /\\d/, label: '\\d', desc: 'rakam' },
  { re: /\\w/, label: '\\w', desc: 'kelime karakteri' },
  { re: /\\s/, label: '\\s', desc: 'boşluk' },
  { re: /\\b/, label: '\\b', desc: 'kelime sınırı' },
  { re: /\^/, label: '^', desc: 'satır başı' },
  { re: /\$/, label: '$', desc: 'satır sonu' },
  { re: /\*/, label: '*', desc: '0 veya daha fazla' },
  { re: /\+/, label: '+', desc: '1 veya daha fazla' },
  { re: /\?/, label: '?', desc: '0 veya 1 (opsiyonel)' },
  { re: /\(\?:/, label: '(?:...)', desc: 'yakalamayan grup' },
  { re: /\(\?</, label: '(?<...>)', desc: 'isimli grup' },
  { re: /\(/, label: '(...)', desc: 'yakalama grubu' },
  { re: /\[/, label: '[...]', desc: 'karakter sınıfı' },
  { re: /\{/, label: '{n,m}', desc: 'tekrar sayısı' },
  { re: /\|/, label: '|', desc: 'veya (alternatif)' },
];

const CHEATSHEET = [
  { pattern: '\\d{3}-\\d{4}', desc: 'Telefon parçası: 555-1234' },
  { pattern: '^[A-Z]', desc: 'Büyük harfle başlayan' },
  { pattern: '\\b\\w{5,}\\b', desc: '5+ harfli kelimeler' },
  { pattern: '#[0-9a-fA-F]{6}', desc: 'Hex renk kodu' },
  { pattern: '(https?:\\/\\/\\S+)', desc: 'URL yakala' },
  { pattern: '\\s+', desc: 'Bir veya daha fazla boşluk' },
];

const MATCH_COLORS = ['#ff9d5c', '#5ce1ff', '#9dff5c', '#ff5c9d', '#c95cff', '#ffe65c'];

const state = { flags: new Set(['g']) };

const patternInput = document.getElementById('pattern');
const testInput = document.getElementById('test-string');
const highlightLayer = document.getElementById('highlight-layer');
const errorLine = document.getElementById('error-line');
const anatomyEl = document.getElementById('anatomy');
const matchesEl = document.getElementById('matches');
const matchCountEl = document.getElementById('match-count');
const flagsEl = document.getElementById('flags');
const cheatGridEl = document.getElementById('cheat-grid');

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderFlags() {
  flagsEl.innerHTML = '';
  FLAGS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'flag-btn' + (state.flags.has(f.key) ? ' active' : '');
    btn.textContent = f.label;
    btn.title = f.title;
    btn.addEventListener('click', () => {
      if (state.flags.has(f.key)) state.flags.delete(f.key);
      else state.flags.add(f.key);
      renderFlags();
      update();
    });
    flagsEl.appendChild(btn);
  });
}

function renderCheatsheet() {
  cheatGridEl.innerHTML = '';
  CHEATSHEET.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cheat-item';
    div.innerHTML = `<code>${escapeHtml(item.pattern)}</code><span class="desc">${item.desc}</span>`;
    div.addEventListener('click', () => {
      patternInput.value = item.pattern;
      update();
    });
    cheatGridEl.appendChild(div);
  });
}

function renderAnatomy(patternStr) {
  anatomyEl.innerHTML = '';
  const found = [];
  TOKEN_EXPLANATIONS.forEach(t => {
    if (t.re.test(patternStr)) found.push(t);
  });

  if (found.length === 0) {
    return;
  }

  found.forEach(t => {
    const span = document.createElement('div');
    span.className = 'anatomy-token';
    span.innerHTML = `<code>${escapeHtml(t.label)}</code><span>${t.desc}</span>`;
    anatomyEl.appendChild(span);
  });
}

function buildRegex() {
  const patternStr = patternInput.value;
  const flagStr = Array.from(state.flags).join('');
  try {
    const regex = new RegExp(patternStr, flagStr);
    errorLine.textContent = '';
    return regex;
  } catch (e) {
    errorLine.textContent = '⚠ ' + e.message;
    return null;
  }
}

function update() {
  const patternStr = patternInput.value;
  const text = testInput.value;
  renderAnatomy(patternStr);

  const regex = buildRegex();
  if (!regex) {
    highlightLayer.innerHTML = escapeHtml(text);
    matchesEl.innerHTML = '<div class="empty-state">Desen geçersiz, eşleşme hesaplanamıyor.</div>';
    matchCountEl.textContent = '';
    return;
  }

  let matches = [];
  if (regex.global) {
    matches = Array.from(text.matchAll(regex));
  } else {
    const m = regex.exec(text);
    if (m) matches = [m];
  }

  // Vurgulu metni oluştur
  if (matches.length === 0) {
    highlightLayer.innerHTML = escapeHtml(text);
  } else {
    let result = '';
    let lastIndex = 0;
    matches.forEach((m, i) => {
      const start = m.index;
      const end = start + m[0].length;
      result += escapeHtml(text.slice(lastIndex, start));
      const color = MATCH_COLORS[i % MATCH_COLORS.length];
      result += `<mark style="background:${color}55;border-bottom:2px solid ${color}">${escapeHtml(m[0])}</mark>`;
      lastIndex = end;
    });
    result += escapeHtml(text.slice(lastIndex));
    highlightLayer.innerHTML = result;
  }

  matchCountEl.innerHTML = `<strong>${matches.length}</strong> eşleşme bulundu`;

  if (matches.length === 0) {
    matchesEl.innerHTML = '<div class="empty-state">Eşleşme bulunamadı. Deseni veya metni değiştirmeyi deneyin.</div>';
    return;
  }

  matchesEl.innerHTML = '';
  matches.forEach((m, i) => {
    const color = MATCH_COLORS[i % MATCH_COLORS.length];
    const div = document.createElement('div');
    div.className = 'match-item';
    div.style.borderLeftColor = color;

    let groupsHtml = '';
    if (m.length > 1) {
      const groupParts = [];
      for (let g = 1; g < m.length; g++) {
        if (m[g] !== undefined) groupParts.push(`grup ${g}: <strong>${escapeHtml(m[g])}</strong>`);
      }
      if (groupParts.length) groupsHtml = `<span class="group">${groupParts.join(' · ')}</span>`;
    }

    if (m.groups) {
      const named = Object.entries(m.groups)
        .filter(([, v]) => v !== undefined)
        .map(([k, v]) => `<span class="group-name">${escapeHtml(k)}</span>: <strong>${escapeHtml(v)}</strong>`);
      if (named.length) groupsHtml += `<span class="group">${named.join(' · ')}</span>`;
    }

    div.innerHTML = `
      <span class="idx">#${i + 1} @ ${m.index}</span>
      <span class="full">${escapeHtml(m[0])}</span>
      ${groupsHtml}
    `;
    matchesEl.appendChild(div);
  });
}

function syncScroll() {
  highlightLayer.scrollTop = testInput.scrollTop;
  highlightLayer.scrollLeft = testInput.scrollLeft;
}

patternInput.addEventListener('input', update);
testInput.addEventListener('input', update);
testInput.addEventListener('scroll', syncScroll);

renderFlags();
renderCheatsheet();
update();
</script>
</body>
</html>
